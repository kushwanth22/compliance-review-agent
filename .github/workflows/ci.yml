# POC 0 CI Pipeline - Zero Cost (GitHub Actions free tier)
# Runs on every push and pull request
# Free for public repos - unlimited minutes

name: CI

on:
  push:
      branches: [main, develop]
        pull_request:
            branches: [main]

            env:
              PYTHON_VERSION: "3.11"

              jobs:
                lint:
                    name: Lint & Format Check
                        runs-on: ubuntu-latest
                            steps:
                                  - uses: actions/checkout@v4

                                        - name: Install uv
                                                uses: astral-sh/setup-uv@v3
                                                        with:
                                                                  version: "latest"

                                                                        - name: Set up Python
                                                                                run: uv python install ${{ env.PYTHON_VERSION }}

                                                                                      - name: Install dependencies
                                                                                              run: uv sync --dev

                                                                                                    - name: Run Ruff linter
                                                                                                            run: uv run ruff check .
                                                                                                            
                                                                                                                  - name: Run Ruff formatter check
                                                                                                                          run: uv run ruff format --check .
                                                                                                                          
                                                                                                                                - name: Run mypy type check
                                                                                                                                        run: uv run mypy . --ignore-missing-imports
                                                                                                                                                continue-on-error: true  # Non-blocking during POC phase
                                                                                                                                                
                                                                                                                                                  test:
                                                                                                                                                      name: Unit & Integration Tests
                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                              needs: lint
                                                                                                                                                                  env:
                                                                                                                                                                        ENV: test
                                                                                                                                                                              LLM_MODEL: ollama/llama3
                                                                                                                                                                                    LLM_BASE_URL: http://localhost:11434
                                                                                                                                                                                          VECTOR_STORE: chroma
                                                                                                                                                                                                CHROMA_PATH: ./data/test_chroma_db
                                                                                                                                                                                                      DATABASE_URL: sqlite+aiosqlite:///./data/test.db
                                                                                                                                                                                                            LOG_LEVEL: WARNING
                                                                                                                                                                                                                  LOG_FORMAT: console
                                                                                                                                                                                                                  
                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                            - uses: actions/checkout@v4
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                  - name: Install uv
                                                                                                                                                                                                                                          uses: astral-sh/setup-uv@v3
                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                            version: "latest"
                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                  - name: Set up Python
                                                                                                                                                                                                                                                                          run: uv python install ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                - name: Install dependencies
                                                                                                                                                                                                                                                                                        run: uv sync --dev
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                              - name: Create data directories
                                                                                                                                                                                                                                                                                                      run: mkdir -p data/test_chroma_db
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                            - name: Run unit tests
                                                                                                                                                                                                                                                                                                                    run: uv run pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                          - name: Run integration tests
                                                                                                                                                                                                                                                                                                                                  run: uv run pytest tests/integration/ -v --tb=short
                                                                                                                                                                                                                                                                                                                                          continue-on-error: true  # Integration tests require Ollama - non-blocking in CI
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                - name: Upload coverage report
                                                                                                                                                                                                                                                                                                                                                        uses: codecov/codecov-action@v4
                                                                                                                                                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                  file: ./coverage.xml
                                                                                                                                                                                                                                                                                                                                                                                            fail_ci_if_error: false
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                              docker-build:
                                                                                                                                                                                                                                                                                                                                                                                                  name: Docker Build Check
                                                                                                                                                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                          needs: test
                                                                                                                                                                                                                                                                                                                                                                                                              steps:
                                                                                                                                                                                                                                                                                                                                                                                                                    - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Build dev Docker image
                                                                                                                                                                                                                                                                                                                                                                                                                                  run: docker build -f docker/Dockerfile.dev -t compliance-review-agent:dev .
                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Verify image runs
                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                          docker run --rm compliance-review-agent:dev uv run python -c "from api.app import create_app; print('App import OK')"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  continue-on-error: true  # May fail if imports need runtime dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
